  // ==========================================
  // --- EXPORT 5: BACKUP QUESTIONS TO CSV ---
  // ==========================================
  function exportQuestionsToCSV() {
    if (!currentViewedQuiz) return;
    
    const quizTitle = currentViewedQuiz.title;
    const questions = JSON.parse(currentViewedQuiz.questions || '[]');
    
    if (questions.length === 0) {
      showToast("No questions to export!", "error");
      return;
    }

    showToast("Preparing Questions CSV...", "warning");

    // 1. Find the maximum number of options across all questions to build a safe header
    let maxOptions = 4; // Default to at least 4 to match your import template
    questions.forEach(q => {
      if (q.options && q.options.length > maxOptions) {
        maxOptions = q.options.length;
      }
    });

    // 2. Build the CSV Header
    let csvContent = "Question,";
    for (let i = 1; i <= maxOptions; i++) {
      csvContent += `Option ${i},`;
    }
    csvContent += "Correct Answer(s),Question Type\n";

    // 3. Loop through every question and add it to the file
    questions.forEach(q => {
      const safeQuestion = (q.question || "").replace(/"/g, '""');
      let row = `"${safeQuestion}",`;
      
      let correctIndices = [];
      
      // Loop through the options and stamp them in
      for (let i = 0; i < maxOptions; i++) {
        if (q.options && q.options[i]) {
          const safeOpt = (q.options[i].text || "").replace(/"/g, '""');
          row += `"${safeOpt}",`;
          
          // Track the 1-based index if it's the correct answer
          if (q.options[i].isCorrect) {
            correctIndices.push(i + 1);
          }
        } else {
          row += `"",`; // Leave empty if they had fewer options
        }
      }
      
      // Join correct answers (e.g., "1" for radio, "1, 3" for checkbox)
      const correctStr = correctIndices.join(", ");
      const qType = q.type === 'checkbox' ? 'Checkboxes' : 'Multiple Choice';
      
      row += `"${correctStr}","${qType}"\n`;
      csvContent += row;
    });

    // 4. Trigger the download!
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    const safeFileName = quizTitle.replace(/[^a-z0-9]/gi, '_').toLowerCase() + "_questions_backup.csv";
    
    link.setAttribute("href", url);
    link.setAttribute("download", safeFileName);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    showToast("Questions Downloaded!", "success");
  }

  // ==========================================
  // --- IMPORT: PROCESS GOOGLE FORMS CSV ---
  // ==========================================
  function executeImportFormsCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    showToast("Checking existing data to prevent duplicates...", "warning");
    
    // 1. Fetch the database FIRST so we know what we already have
    google.script.run
      .withSuccessHandler(function(existingResponses) {
        
        // --- BULLETPROOF MEMORY BANK ---
        const existingSet = new Set();
        if (existingResponses && existingResponses.length > 0) {
          existingResponses.forEach(res => {
            let safeEmail = (res.email || "").trim().toLowerCase();
            
            // Convert dates to absolute Unix math (ignoring text formatting differences)
            let d = new Date(res.date);
            // Round to the nearest minute (60000 ms) to catch any weird seconds shifting
            let timeKey = isNaN(d.getTime()) ? String(res.date).trim() : Math.floor(d.getTime() / 60000);
            
            // Include the score in the fingerprint to be 100% sure
            let safeScore = String(res.score).trim();
            
            existingSet.add(safeEmail + "|" + timeKey + "|" + safeScore);
          });
        }

        showToast("Reading CSV file...", "warning");
        
        const reader = new FileReader();
        reader.onload = function(e) {
          const text = e.target.result;
          const rows = parseRobustCSV(text);
          
          if (rows.length < 2) { 
            showToast("CSV is empty or invalid.", "error"); 
            document.getElementById('importFormsCsv').value = ''; 
            return; 
          }
          
          const headers = rows[0].map(h => h.trim().toLowerCase());
          
          let timeIdx = headers.findIndex(h => h.includes("timestamp"));
          let emailIdx = headers.findIndex(h => h.includes("email address") || h === "email");
          let scoreIdx = headers.findIndex(h => h.includes("score"));
          
          if (emailIdx === -1) {
            showToast("Could not find an 'Email Address' column. Is this a Google Forms CSV?", "error");
            document.getElementById('importFormsCsv').value = ''; 
            return;
          }
          
          const questions = JSON.parse(currentViewedQuiz.questions || '[]');
          const qMap = {}; 
          
          questions.forEach((q, qIndex) => {
            let exactQ = q.question.trim().toLowerCase();
            let cleanQ = exactQ.replace(/[^a-z0-9]/g, ''); 
            
            let colIdx = headers.findIndex(h => {
              let exactH = h.trim().toLowerCase();
              let cleanH = exactH.replace(/[^a-z0-9]/g, '');
              
              if (exactH === exactQ) return true;
              if (cleanH === cleanQ) return true;
              if (cleanH.length > 10 && cleanQ.length > 10) {
                return cleanH.includes(cleanQ) || cleanQ.includes(cleanH);
              }
              return false;
            });
            
            if (colIdx !== -1) qMap[qIndex] = colIdx;
          });
          
          const toImport = [];
          for (let i = 1; i < rows.length; i++) {
             const row = rows[i];
             if (!row || !row[emailIdx] || row[emailIdx].trim() === "") continue;
             
             let safeEmail = row[emailIdx].trim().toLowerCase();
             // --- NEW: FORCE FULL TIMEZONE DATE FORMAT ---
             let safeDate = new Date().toString(); // Default fallback
             if (timeIdx !== -1 && row[timeIdx] && row[timeIdx].trim() !== "") {
                 let parsedDate = new Date(row[timeIdx].trim());
                 // If it is a valid date, force it into the rich GMT format!
                 if (!isNaN(parsedDate.getTime())) {
                     safeDate = parsedDate.toString(); 
                 } else {
                     safeDate = row[timeIdx].trim(); 
                 }
             }
             
             let rawScore = scoreIdx !== -1 && row[scoreIdx] ? row[scoreIdx] : "0";
             let scorePercent = "0%";
             
             if (rawScore.includes('/')) {
               let parts = rawScore.split('/');
               let num = parseFloat(parts[0].trim());
               let den = parseFloat(parts[1].trim());
               if (den > 0) scorePercent = Math.round((num/den)*100) + '%';
             } else {
               let num = parseFloat(rawScore.trim());
               if (!isNaN(num)) scorePercent = num + '%'; 
             }

             // --- NEW: BULLETPROOF DEDUPLICATION CHECK ---
             let d = new Date(safeDate);
             let timeKey = isNaN(d.getTime()) ? safeDate : Math.floor(d.getTime() / 60000);
             let fingerprint = safeEmail + "|" + timeKey + "|" + scorePercent;
             
             if (existingSet.has(fingerprint)) {
               continue; // SKIP! We already have this exact person, at this exact minute, with this exact score!
             }
             
             let answersObj = {};
             questions.forEach((q, qIndex) => {
               let csvCol = qMap[qIndex];
               if (csvCol !== undefined && row[csvCol]) {
                 let ansArr = row[csvCol].split(', ').map(s => s.trim()).filter(s => s.length > 0);
                 answersObj[`q_${qIndex}`] = ansArr;
               } else {
                 answersObj[`q_${qIndex}`] = [];
               }
             });
             
             toImport.push({
               email: safeEmail,
               date: safeDate,
               score: scorePercent,
               answersJson: JSON.stringify(answersObj)
             });
          }
          
          if (toImport.length === 0) {
            showToast("No new responses found! Everything is already up to date.", "success");
            document.getElementById('importFormsCsv').value = ''; 
            return;
          }

          showToast(`Importing ${toImport.length} NEW responses...`, "warning");
          document.getElementById('importFormsCsv').value = ''; 
          
          google.script.run
            .withSuccessHandler(function(count) {
              showToast(`Successfully added ${count} new responses!`, "success");
              refreshAnalytics(); 
            })
            .withFailureHandler(function(err) {
              showToast("Error importing: " + err.message, "error");
            })
            .importBulkResponses(currentViewedQuiz.id, toImport);
        };
        reader.readAsText(file);
        
      })
      .withFailureHandler(function(err) {
        showToast("Error connecting to database: " + err.message, "error");
        document.getElementById('importFormsCsv').value = ''; 
      })
      .getRawQuizResponses(currentViewedQuiz.id);
  }

  // A robust CSV parser to handle nasty commas embedded inside question options
  function parseRobustCSV(str) {
    const arr = []; let quote = false; let row = 0, col = 0;
    for (let c = 0; c < str.length; c++) {
      let cc = str[c], nc = str[c+1];
      arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
      if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
      if (cc == '"') { quote = !quote; continue; }
      if (cc == ',' && !quote) { ++col; continue; }
      if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
      if (cc == '\n' && !quote) { ++row; col = 0; continue; }
      if (cc == '\r' && !quote) { ++row; col = 0; continue; }
      arr[row][col] += cc;
    }
    return arr;
  }

  // ==========================================
  // --- UI: LIVE RESPONSES TABLE FILTER & SORT ---
  // ==========================================
  function applyResponseFilters() {
    // 1. Grab all the active queries from the dropdowns
    const emailQuery = document.getElementById('filterEmail').value.toLowerCase().trim();
    const attemptQuery = document.getElementById('filterAttempt').value;
    const statusQuery = document.getElementById('filterStatus').value;
    const sortQuery = document.getElementById('sortTable').value;

    const container = document.getElementById('analytics-container');
    if (!container) return;
    
    const table = container.querySelector('table');
    if (!table) return; 

    const tbody = table.querySelector('tbody') || table;
    const rows = Array.from(table.querySelectorAll('tr'));

    // Separate the header row from the actual data rows
    const headerRow = rows.find(row => row.querySelector('th'));
    let dataRows = rows.filter(row => !row.querySelector('th'));

    // 2. APPLY THE FILTERS (Hide/Show)
    dataRows.forEach(row => {
      // Index 0: Email, Index 1: Attempt, Index 2: Score, Index 3: Status, Index 4: Date
      const emailCell = row.cells[0]; 
      const attemptCell = row.cells[1]; 
      const statusCell = row.cells[3]; 

      if (!emailCell || !attemptCell || !statusCell) return;

      const emailText = emailCell.innerText.toLowerCase();
      const attemptNum = parseInt(attemptCell.innerText) || 1;
      const statusText = statusCell.innerText.toLowerCase(); // Will be "passed", "failed", or "-"

      let emailMatch = emailText.includes(emailQuery);
      
      let attemptMatch = true;
      if (attemptQuery === '1') attemptMatch = (attemptNum === 1);
      else if (attemptQuery === '2+') attemptMatch = (attemptNum >= 2);

      let statusMatch = true;
      if (statusQuery === 'passed') statusMatch = statusText.includes('passed');
      else if (statusQuery === 'failed') statusMatch = statusText.includes('failed');

      // If it passes all 3 tests, show it!
      if (emailMatch && attemptMatch && statusMatch) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });

    // 3. APPLY THE SORTING (Reorder Rows)
    dataRows.sort((a, b) => {
      if (sortQuery.startsWith('date')) {
        // Grab the date text and convert to a timestamp for math
        let dateA = new Date(a.cells[4].innerText).getTime() || 0;
        let dateB = new Date(b.cells[4].innerText).getTime() || 0;
        return sortQuery === 'date-desc' ? dateB - dateA : dateA - dateB;
      } 
      else if (sortQuery.startsWith('score')) {
        // Strip the % and convert to a number for math
        let scoreA = parseFloat(a.cells[2].innerText) || 0;
        let scoreB = parseFloat(b.cells[2].innerText) || 0;
        return sortQuery === 'score-desc' ? scoreB - scoreA : scoreA - scoreB;
      }
      return 0;
    });

    // 4. RE-INJECT ROWS INTO TABLE
    if (headerRow) tbody.appendChild(headerRow); // Always put the header at the very top!
    dataRows.forEach(row => tbody.appendChild(row)); // Stack the sorted rows underneath
  }
